name: Build Unsigned IPA

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Resolve Swift Packages
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project EpubAudiobookApp.xcodeproj

      - name: Build App
        run: |
          xcodebuild clean build \
            -project EpubAudiobookApp.xcodeproj \
            -scheme EpubAudiobookApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Show Build Products
        run: |
          echo "Current directory:"
          pwd

          echo ""
          echo "Contents of build folder:"
          ls -R build || true

          echo ""
          echo "Searching for .app bundle:"
          find build -name "*.app"

      - name: Package Unsigned IPA
        run: |
          APP_PATH=$(find build -name "*.app" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found."
            exit 1
          fi

          echo "Using app:"
          echo "$APP_PATH"

          mkdir Payload
          cp -R "$APP_PATH" Payload/

          cd Payload
          zip -r ../EpubAudiobookApp-unsigned.ipa .
          cd ..

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: EpubAudiobookApp-Unsigned-IPA
          path: EpubAudiobookApp-unsigned.ipa
