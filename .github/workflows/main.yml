name: Build Unsigned IPA

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Resolve Swift Packages
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project EpubAudiobookApp.xcodeproj

      - name: Build App
        run: |
          xcodebuild \
            clean build \
            -project EpubAudiobookApp.xcodeproj \
            -scheme EpubAudiobookApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Locate App Bundle
        run: |
          echo "Searching for .app bundle..."
          find build -name "*.app"

      - name: Create IPA
        run: |
          APP_PATH=$(find build -name "*.app" | head -n 1)

          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: Could not find .app bundle."
            exit 1
          fi

          echo "Found app at:"
          echo "$APP_PATH"

          rm -rf Payload
          mkdir Payload

          cp -R "$APP_PATH" Payload/

          rm -f EpubAudiobookApp.ipa

          /usr/bin/zip -qry EpubAudiobookApp.ipa Payload

          echo "IPA contents:"
          unzip -l EpubAudiobookApp.ipa | head -30

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: EpubAudiobookApp-Unsigned-IPA
          path: EpubAudiobookApp.ipa
